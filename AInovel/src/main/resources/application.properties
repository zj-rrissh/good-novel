spring.application.name=AInovel
mybatis.configuration.map-underscore-to-camel-case=true

spring.datasource.url=${AINOVEL_DB_URL:jdbc:mysql://127.0.0.1:3307/ainovel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${AINOVEL_DB_USERNAME:ainovel}
spring.datasource.password=${AINOVEL_DB_PASSWORD:ainovel123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.pool-name=ainovel-hikari
spring.datasource.hikari.minimum-idle=${AINOVEL_DB_MIN_IDLE:1}
spring.datasource.hikari.maximum-pool-size=${AINOVEL_DB_MAX_POOL_SIZE:8}
spring.datasource.hikari.connection-timeout=${AINOVEL_DB_CONNECTION_TIMEOUT_MS:3000}
spring.datasource.hikari.validation-timeout=${AINOVEL_DB_VALIDATION_TIMEOUT_MS:2000}
spring.datasource.hikari.initialization-fail-timeout=${AINOVEL_DB_INIT_FAIL_TIMEOUT:3000}

spring.sql.init.mode=${AINOVEL_SQL_INIT_MODE:never}
spring.sql.init.schema-locations=classpath:db/schema-dev.sql
spring.sql.init.continue-on-error=false

spring.data.redis.host=${AINOVEL_REDIS_HOST:127.0.0.1}
spring.data.redis.port=${AINOVEL_REDIS_PORT:6380}
spring.data.redis.username=${AINOVEL_REDIS_USERNAME:}
spring.data.redis.password=${AINOVEL_REDIS_PASSWORD:}
spring.data.redis.database=${AINOVEL_REDIS_DATABASE:0}
spring.data.redis.timeout=${AINOVEL_REDIS_TIMEOUT:3s}
spring.data.redis.connect-timeout=${AINOVEL_REDIS_CONNECT_TIMEOUT:3s}

ainovel.task.core-pool-size=4
ainovel.task.max-pool-size=8
ainovel.task.queue-capacity=200
ainovel.task.keep-alive-seconds=60
ainovel.task.thread-name-prefix=ainovel-async-

ainovel.security.whitelist-paths[0]=/api/v1/auth/login
ainovel.security.whitelist-paths[1]=/api/v1/auth/register
ainovel.security.whitelist-paths[2]=/api/v1/auth/refresh
ainovel.security.whitelist-paths[3]=/actuator/health
ainovel.security.access-token-ttl=PT2H
ainovel.security.refresh-token-ttl=P7D
ainovel.security.jwt-issuer=ainovel
ainovel.security.jwt-secret=${AINOVEL_JWT_SECRET}
ainovel.security.rate-limit-enabled=true
ainovel.security.rate-limit-auth-threshold=20
ainovel.security.rate-limit-auth-window-seconds=60
ainovel.security.rate-limit-comment-threshold=10
ainovel.security.rate-limit-comment-window-seconds=60
ainovel.security.rate-limit-read-threshold=120
ainovel.security.rate-limit-read-window-seconds=60
ainovel.security.risk-control-enabled=true
ainovel.security.risk-auth-threshold=40
ainovel.security.risk-auth-window-seconds=300
ainovel.security.risk-comment-threshold=20
ainovel.security.risk-comment-window-seconds=300
ainovel.security.risk-read-threshold=200
ainovel.security.risk-read-window-seconds=300

# CORS defaults for local frontend integration.
ainovel.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
ainovel.cors.allowed-methods=GET,HEAD,POST,PUT,PATCH,DELETE,OPTIONS
ainovel.cors.allowed-headers=*

ainovel.cache.local-ttl=PT1M
ainovel.cache.detail-ttl=PT5M
ainovel.cache.chapter-content-ttl=PT30M
ainovel.cache.null-value-ttl=PT1M
ainovel.cache.ttl-jitter-percent=10
ainovel.cache.key-prefix=ainovel
ainovel.cache.lock-ttl=PT5S
ainovel.cache.lock-retry-interval=80ms
ainovel.cache.lock-retry-times=2

ainovel.redisson.connect-timeout=PT3S
ainovel.redisson.timeout=PT3S
ainovel.redisson.lock-wait-time=200ms
ainovel.redisson.lock-lease-time=PT5S
ainovel.redisson.address=${AINOVEL_REDIS_ADDRESS:redis://127.0.0.1:6380}
ainovel.redisson.username=${AINOVEL_REDIS_USERNAME:}
ainovel.redisson.password=${AINOVEL_REDIS_PASSWORD:}
ainovel.redisson.database=${AINOVEL_REDIS_DATABASE:0}
