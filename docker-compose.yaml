
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.simple
    restart: unless-stopped
    env_file:
      - ./.env.docker.local
    environment:
      SPRING_PROFILES_ACTIVE: docker
      AINOVEL_DB_URL: jdbc:mysql://mysql:3306/ainovel?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      AINOVEL_DB_USERNAME: ${MYSQL_USER:-ainovel}
      AINOVEL_DB_PASSWORD: ${MYSQL_PASSWORD:-ainovel123}
      AINOVEL_REDIS_HOST: redis
      AINOVEL_REDIS_PORT: 6379
      AINOVEL_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AINOVEL_REDIS_ADDRESS: redis://redis:6379
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - ./.env.docker.local
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  redis:
    image: redis:7
    restart: unless-stopped
    env_file:
      - ./.env.docker.local
    command:
      - /bin/sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD";
        fi
        exec redis-server --appendonly yes;
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-cli -a \"$$REDIS_PASSWORD\" ping; else redis-cli ping; fi"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  frontend:
    build:
      context: ../ainovel-front
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  redis-data:
